name: Build Portable Binaries (macOS)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version to build'
        required: true
        default: '8.3'
        type: choice
        options:
          - '8.3'
          - '8.2'
          - '8.1'
          - '8.0'
          - '7.4'
      nginx_version:
        description: 'Nginx Version to build'
        required: true
        default: '1.29.8'
        type: string
      release_tag:
        description: 'Release Tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

jobs:
  build-php:
    name: Build PHP ${{ github.event.inputs.php_version || '8.3' }} on macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest # Apple Silicon (M1/M2/M3)
            arch: aarch64
            spc_arch: aarch64
            
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SPC Source
        uses: actions/cache@v3
        with:
          path: source
          key: spc-source-php-${{ github.event.inputs.php_version || '8.3' }}-${{ matrix.arch }}

      - name: Download static-php-cli (SPC)
        run: |
          wget -O spc.tgz "https://github.com/crazywhalecc/static-php-cli/releases/latest/download/spc-macos-${{ matrix.spc_arch }}.tar.gz"
          tar -xvf spc.tgz
          chmod +x spc
          ./spc --version

      - name: Setup Build Environment (SPC Doctor)
        run: |
          # Эта команда автоматически устанавливает нужные системные пакеты (pkg-config, cmake, autoconf и т.д.)
          ./spc doctor --auto-fix

      - name: Download PHP Sources and Extensions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Загружаем исходники PHP и нужные расширения для 1С-Битрикс (убрали sysvsh, sysvmsg, sysvsem, pdo_sqlite, pdo_mysql, mysqli, mysqlnd, sqlite3 т.к. static-php-cli имеет свои особенности именования)
          ./spc download --with-php=${{ github.event.inputs.php_version || '8.3' }} --for-extensions="apcu,bcmath,bz2,calendar,ctype,curl,dom,exif,fileinfo,filter,ftp,gd,iconv,igbinary,intl,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,readline,redis,session,shmop,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"

      - name: Build PHP FPM & CLI
        run: |
          # Собираем FPM и CLI
          ./spc build --build-cli --build-fpm "apcu,bcmath,bz2,calendar,ctype,curl,dom,exif,fileinfo,filter,ftp,gd,iconv,igbinary,intl,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,readline,redis,session,shmop,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"

      - name: Package Binaries
        run: |
          mkdir -p build_output/php
          cp buildroot/bin/php build_output/php/
          cp buildroot/bin/php-fpm build_output/php/
          cd build_output
          tar -czvf php-${{ github.event.inputs.php_version || '8.3' }}-macos-${{ matrix.arch }}.tar.gz php/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ github.event.inputs.php_version || '8.3' }}-macos-${{ matrix.arch }}
          path: build_output/php-*.tar.gz

  build-nginx:
    name: Build Nginx ${{ github.event.inputs.nginx_version || '1.29.8' }} on macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest # Apple Silicon (M1/M2/M3)
            arch: aarch64
            
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Dependencies (macOS)
        run: |
          # Устанавливаем зависимости для сборки (PCRE, zlib, OpenSSL)
          brew install pcre zlib openssl

      - name: Download Nginx Sources
        run: |
          NGINX_VERSION=${{ github.event.inputs.nginx_version || '1.29.8' }}
          wget "http://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar -xvf "nginx-${NGINX_VERSION}.tar.gz"
          mv "nginx-${NGINX_VERSION}" nginx-src

      - name: Configure and Build Nginx
        run: |
          cd nginx-src
          
          # Получаем пути к библиотекам из Homebrew для статической линковки
          OPENSSL_DIR=$(brew --prefix openssl)
          PCRE_DIR=$(brew --prefix pcre)
          ZLIB_DIR=$(brew --prefix zlib)

          # Конфигурируем Nginx
          # Важно: указываем префиксы так, чтобы они указывали на нашу структуру папок
          ./configure \
            --prefix=/tmp/nginx-build \
            --sbin-path=nginx \
            --conf-path=nginx.conf \
            --error-log-path=error.log \
            --http-log-path=access.log \
            --pid-path=nginx.pid \
            --lock-path=nginx.lock \
            --http-client-body-temp-path=client_body_temp \
            --http-proxy-temp-path=proxy_temp \
            --http-fastcgi-temp-path=fastcgi_temp \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_gzip_static_module \
            --with-cc-opt="-I$OPENSSL_DIR/include -I$PCRE_DIR/include -I$ZLIB_DIR/include" \
            --with-ld-opt="-L$OPENSSL_DIR/lib -L$PCRE_DIR/lib -L$ZLIB_DIR/lib"

          # Собираем и "устанавливаем" во временную папку
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Package Nginx Binary
        run: |
          mkdir -p build_output/nginx
          # Нам нужен только бинарник, конфиги Omut сгенерирует сам на Rust
          cp /tmp/nginx-build/nginx build_output/nginx/
          
          cd build_output
          tar -czvf nginx-${{ github.event.inputs.nginx_version || '1.29.8' }}-macos-${{ matrix.arch }}.tar.gz nginx/

      - name: Upload Nginx Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx-${{ github.event.inputs.nginx_version || '1.29.8' }}-macos-${{ matrix.arch }}
          path: build_output/nginx-*.tar.gz

  publish_release:
    name: Publish Release and Update Manifest
    needs: [build-php, build-nginx]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Удаляем релиз, если он уже существует (чтобы перезаписывать v1.0.0 при отладке)
          gh release delete ${{ github.event.inputs.release_tag }} --cleanup-tag -y || true
          
          # Создаем новый релиз и заливаем туда все собранные .tar.gz файлы
          gh release create ${{ github.event.inputs.release_tag }} artifacts/*/*.tar.gz \
            --title "Release ${{ github.event.inputs.release_tag }}" \
            --notes "Automated build of portable binaries for Omut"

      - name: Update versions.json
        run: |
          PHP_V="${{ github.event.inputs.php_version || '8.3' }}"
          NGINX_V="${{ github.event.inputs.nginx_version || '1.29.8' }}"
          TAG="${{ github.event.inputs.release_tag }}"
          REPO="${{ github.repository }}"
          
          # Если файла нет, создаем скелет (для MariaDB хардкодим ссылку)
          if [ ! -f versions.json ]; then
            echo '{"php":{},"nginx":{},"mariadb":{"11.4.2":{"aarch64":"https://archive.mariadb.org/mariadb-11.4.2/bintar-osx10.13-aarch64/mariadb-11.4.2-osx10.13-aarch64.tar.gz","x86_64":"https://archive.mariadb.org/mariadb-11.4.2/bintar-osx10.13-x86_64/mariadb-11.4.2-osx10.13-x86_64.tar.gz"}}}' > versions.json
          fi

          # Используем jq для обновления JSON файла
          jq --arg php_v "$PHP_V" \
             --arg nginx_v "$NGINX_V" \
             --arg tag "$TAG" \
             --arg repo "$REPO" \
             '.php[$php_v] = {
                "aarch64": "https://github.com/\($repo)/releases/download/\($tag)/php-\($php_v)-macos-aarch64.tar.gz",
                "x86_64": "https://github.com/\($repo)/releases/download/\($tag)/php-\($php_v)-macos-x86_64.tar.gz"
              } |
              .nginx[$nginx_v] = {
                "aarch64": "https://github.com/\($repo)/releases/download/\($tag)/nginx-\($nginx_v)-macos-aarch64.tar.gz",
                "x86_64": "https://github.com/\($repo)/releases/download/\($tag)/nginx-\($nginx_v)-macos-x86_64.tar.gz"
              }' versions.json > tmp.json && mv tmp.json versions.json
          
          cat versions.json

      - name: Commit and Push versions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "Auto-update versions.json for ${{ github.event.inputs.release_tag }}" || echo "No changes to commit"
          git push
