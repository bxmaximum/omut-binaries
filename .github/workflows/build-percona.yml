name: Build Percona Server

on:
  workflow_dispatch:
    inputs:
      percona_version:
        description: 'Percona version to build (8.0 or 8.4)'
        required: true
        default: '8.4'
        type: choice
        options:
          - '8.0'
          - '8.4'

jobs:
  build-macos:
    name: Build on macOS (Apple Silicon)
    runs-on: macos-14 # aarch64
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          brew update
          brew install cmake openssl@3 pkg-config bison ncurses zlib zstd lz4 protobuf icu4c rpcgen libfido2
          brew link bison --force

      - name: Clone Percona Server
        run: |
          git clone https://github.com/percona/percona-server.git
          cd percona-server
          git checkout ${{ github.event.inputs.percona_version }}
          git submodule init
          git submodule update

      - name: Configure CMake
        run: |
          cd percona-server
          export PATH="/opt/homebrew/opt/bison/bin:/opt/homebrew/opt/ncurses/bin:$PATH"
          export OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)
          export PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig
          export CXXFLAGS="-I$(brew --prefix icu4c)/include"
          export LDFLAGS="-L$(brew --prefix icu4c)/lib"

          cmake . \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_CONFIG=mysql_release \
            -DFEATURE_SET=community \
            -DCMAKE_INSTALL_PREFIX=/tmp/percona-build \
            -DWITH_SSL=system \
            -DDOWNLOAD_BOOST=1 \
            -DWITH_BOOST=../boost_cache \
            -DWITH_ICU=system \
            -DWITH_ZLIB=system

      - name: Compile
        run: |
          cd percona-server
          make -j$(sysctl -n hw.ncpu)

      - name: Install to prefix
        run: |
          cd percona-server
          make install

      - name: Create Portable Archive
        run: |
          cd /tmp
          # Создаем архив
          tar -czvf percona-server-${{ github.event.inputs.percona_version }}-macos-aarch64.tar.gz percona-build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: percona-server-${{ github.event.inputs.percona_version }}-macos-aarch64
          path: /tmp/percona-server-${{ github.event.inputs.percona_version }}-macos-aarch64.tar.gz
          retention-days: 5